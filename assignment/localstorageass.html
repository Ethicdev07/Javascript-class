<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignUp Page</title>
    <style>
      body {
        background: #e8e8e8;
      }

      .container {
        margin-top: 100px;
      }

      .card {
        /* margin-top: 100px; */
        border: medium solid goldenrod;
        border: none;
        width: 35%;
        margin: auto;
        border-radius: 10px;
        box-shadow: 2px 2px 5px 5px #888888;
      }

      h1 {
        text-align: center;
        color: black;
      }

      .text-inp {
        padding: 10px;
        width: 90%;
        margin-left: 12px;
        background: aliceblue;
        font-size: 15px;
        border-radius: 5px;
        border: none;
      }

      .agreement {
        text-align: center;
      }

      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
      }

      #signupBtn {
        width: 100%;
        height: 30px;
        font-size: 18px;
        font-family: "Times New Roman", Times, serif;
        font-weight: bold;
        border: thin solid gold;
        cursor: pointer;
        border-radius: 5px;
        color: white;
        background: blue;
        border: none;
        outline: none;
      }
      #signupBtn:hover {
        background: green;
      }

      .log {
        text-align: center;
        padding: 10px;
      }

      .log button {
        width: 80px;
        height: 30px;
        font-size: 15px;
        font-family: "Times New Roman", Times, serif;
        font-weight: bold;
        text-align: center;
        color: whitesmoke;
        background: blue;
        border-radius: 5px;
        border: none;
        cursor: pointer;
      }

      .card-2 {
        border: medium solid goldenrod;
        border: none;
        width: 35%;
        margin: auto;
        border-radius: 10px;
        display: none;
        box-shadow: 2px 2px 5px 5px #888888;
      }

      .textspan {
        color: black;
        text-align: center;
        margin-bottom: 5px;
      }

      .login-input input {
        padding: 10px;
        width: 90%;
        margin-left: 12px;
        background: aliceblue;
        font-size: 15px;
        border-radius: 5px;
        border: none;
      }

      .btn button {
        width: 100%;
        height: 30px;
        font-size: 18px;
        font-family: "Times New Roman", Times, serif;
        font-weight: bold;
        border: thin solid gold;
        cursor: pointer;
        border-radius: 5px;
        color: white;
        background: blue;
        border: none;
        outline: none;
      }

      .log-2 {
        text-align: center;
        padding: 10px;
      }

      .log-2 button {
        width: 80px;
        height: 30px;
        font-size: 15px;
        font-family: "Times New Roman", Times, serif;
        font-weight: bold;
        text-align: center;
        color: whitesmoke;
        background: blue;
        border-radius: 5px;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card" id="card">
        <h1>Sign Up</h1>
        <div class="input">
          <input
            class="text-inp"
            type="text"
            placeholder="first name"
            id="firstName-input"
            required
          /><br /><br />
          <input
            class="text-inp"
            type="text"
            placeholder="Last name"
            id="lastName-input"
            required
          /><br /><br />
          <input
            class="text-inp"
            type="email"
            placeholder="Email-address"
            id="email-input"
            required
          /><br /><br />
          <input
            class="text-inp"
            type="password"
            placeholder="Password"
            name="password"
            id="password-input"
            required
          /><br /><br />
          <input
            class="text-inp"
            type="password"
            placeholder="Confirm Password"
            id="confirmPassword-input"
            required
          /><br /><br />
        </div>
        <div class="agreement">
          <span style="color: black"
            ><input type="checkbox" />I agree with privacy and policy</span
          >
        </div>

        <div class="btn">
          <button id="signupBtn" onclick="signUp()">Sign Up</button>
        </div>

        <div class="log">
          <span style="color: black"
            >Already have an account?
            <button onclick="loginPage()">Login</button></span
          >
        </div>
      </div>

      <div class="card-2" id="card-2">
        <div class="textspan">
          <h2>Log In</h2>
          <span>Please log-in to continue</span>
        </div>
        <div class="login-input">
          <input
            type="Email"
            placeholder="Email-address"
            id="emailInput"
          /><br /><br />
          <input type="password" placeholder="password" id="passwordInput" />
        </div>
        <div class="btn">
          <button id="login" onclick="login()">log in</button>
        </div>
        <div class="log-2">
          <span style="color: black"
            >Don't have an account?
            <button onclick="signupPage()">SignUp</button></span
          >
        </div>
      </div>
    </div>
  </body>

  <script>
    let firstName = document.getElementById("firstName-input");
    let lastName = document.getElementById("lastName-input");
    let emailAddress = document.getElementById("email-input");
    let password = document.getElementById("password-input");
    let confirmPassword = document.getElementById("confirmPassword-input");

    let arr = [];

    let displayLoginPage = () => {
      document.getElementById("card").style.display = "none";
      document.getElementById("card-2").style.display = "block";
    };

    let displaySignupPage = () => {
      document.getElementById("card").style.display = "block";
      document.getElementById("card-2").style.display = "none";
    };

    function loginPage() {
      displayLoginPage();
    }

    function signupPage() {
      displaySignupPage();
    }

    function signUp() {
      if (
        !firstName.value ||
        !lastName.value ||
        !emailAddress.value ||
        !password.value ||
        !confirmPassword.value
      ) {
        alert("Please fill in all the fields.");
        return;
      }

      if (password.value !== confirmPassword.value) {
        alert("Passwords do not match! Please re-enter.");
        return;
      }

      let user = {
        email: emailAddress.value,
        password: password.value,
        confirmPassword: confirmPassword.value,
      };

      let storedArr = JSON.parse(localStorage.getItem("userArray")) || [];
      let existingUser = storedArr.find(
        (user) => user.email === emailAddress.value
      );

      if (existingUser) {
        alert("This user is already registered! Please use a different email.");
        return;
      }

      storedArr.push(user);
      localStorage.setItem("userArray", JSON.stringify(storedArr));

      window.location.href = "../todo.html";
    }

    function login() {
      let loginEmail = document.getElementById("emailInput").value;
      let loginPassword = document.getElementById("passwordInput").value;
      let storedArr = JSON.parse(localStorage.getItem("userArray")) || [];

      if (storedArr.length === 0) {
        alert("Please sign up first!");
        return;
      }

      let userInfo = storedArr.find(
        (user) => user.email === loginEmail && user.password === loginPassword
      );

      if (userInfo) {
        window.location.href = "../todo.html";
      } else {
        alert("Invalid email or password");
      }
    }
  </script>
</html>
