<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Quiz App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body class="bg-light">
    <div class="container">
        <div class="card p-4 mt-5 shadow-lg">
            <h2 class="text-center">Quiz Application</h2>
            <hr>
            <div id="scores" class="text-success fw-bold mb-3"></div>
            <p id="progress" class="text-secondary fw-semibold"></p>
            <h1 id="qshow" class="fw-bold"></h1>
            <div id="oshow" class="mt-3 mb-4"></div>
            <div class="d-flex justify-content-between">
                <button class="btn btn-primary" onclick="controls('prev')">Prev</button>
                <button class="btn btn-success" onclick="controls('next')">Next</button>
            </div>
            <button class="btn btn-info mt-3 w-100" onclick="mySubmit()">Submit</button>
        </div>
    </div>

    
   
    <script>
        let index = 0;
        let questions = [
            { question: "Who is your javascript instructor?", option: ['Teslim', 'Ben', 'Dammy', 'Mike'], answer: 'Dammy', choosen: '' },
            { question: "Who is the president of Nigeria?", option: ['Tinubu', 'Ben', 'Dammy', 'Mike'], answer: 'Tinubu', choosen: '' },
            { question: "What is a Nonu?", option: ['Teslim', 'Name of .....', 'Dammy', 'Mike'], answer: 'Name of .....', choosen: '' },
            { question: "Capital of Nigeria?", option: ['Lagos', 'Kebbi', 'Abuja', 'Mike'], answer: 'Abuja', choosen: '' },
            { question: "Capital of Oyo?", option: ['Ibadan', 'Ben', 'Dammy', 'Mike'], answer: 'Ibadan', choosen: '' },
            { question: "What is the capital of Egypt?", option: ['Cairo', 'Abuja', 'Accra', 'Pretoria'], answer: 'Cairo', choosen: ''},
        ];

        console.log(questions);
        

        function showQuestion() {
            if (index < 0) index = 0;
            if (index >= questions.length) index = questions.length - 1;

            document.getElementById('oshow').innerHTML = '';
            document.getElementById('qshow').innerHTML = questions[index].question;
            document.getElementById('progress').innerHTML = `Question ${index + 1} of ${questions.length}`;

            questions[index].option.forEach((el) => {
                
                document.getElementById('oshow').innerHTML += `<p>
                    <input  type="radio" name="option" onclick="handleCheck('${el}')" ${el == questions[index].choosen ? 'checked' : ''}> ${el}
                    </p>`;

            });
        }

        function controls(direction) {
            console.log(direction);
            
            if (direction === 'next' && index < questions.length - 1) {
                index++;
            } else if (direction === 'prev' && index > 0) {
                index--;
            }
            else{
                alert('No more question');
            }
            showQuestion();
        }

        function handleCheck(answer) {
            console.log(answer);
            
            questions[index].choosen = answer;
        }

        function mySubmit() {
            let unanswered = questions.some(q => q.choosen === '');
            if (unanswered) {
                alert('Please answer all questions before submitting.');
                return;
            }

            let score = questions.filter((el) => el.answer === el.choosen).length;
            document.getElementById('scores').innerHTML = `Your score is ${score} / ${questions.length}`;
        }

        showQuestion();        
        
        
        
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
