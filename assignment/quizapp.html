<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap Quiz App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>

  <body class="bg-light">
    <div class="container">
      <div class="card p-4 mt-5 shadow-lg">
        <h2 class="text-center">Quiz Application</h2>
        <hr />
        <div id="scores" class="text-success fw-bold mb-3"></div>
        <p id="progress" class="text-secondary fw-semibold"></p>
        <h1 id="qshow" class="fw-bold"></h1>
        <div id="oshow" class="mt-3 mb-4"></div>
        <div class="d-flex justify-content-between">
          <button class="btn btn-primary" onclick="controls('prev')">
            Prev
          </button>
          <button class="btn btn-success" onclick="controls('next')">
            Next
          </button>
        </div>
        <button class="btn btn-info mt-3 w-100" onclick="mySubmit()">
          Submit
        </button>
      </div>
    </div>

    <!-- <input type="radio"> -->

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <script src="./quizapp.js"></script>
  </body>
</html>
