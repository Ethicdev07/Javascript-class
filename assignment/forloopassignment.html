<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            background: burlywood;
        }
        h1{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 30px;
            font-weight: 700;
        }
        p{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 20px;
            font-weight: 500;
        }
        button{
            padding: 9px 25px;
            border-radius: 5px;
            color: white;
            background: blue;
            border: none;
        }
        #displayTables{
            display: flex;
            gap: 2em;
            flex-wrap: wrap;
            width: 100%;
        }
        input{
            height: 30px;
        }
       
    </style>
</head>

<body>
    <h1>
        Multiplication Table Generator
    </h1>
    <p>
        Generate a Multiplication table
    </p>
    <span>From:</span> <input type="number" id="input1"> <span>to</span> <input type="number" id="input2">
    <button onclick="generateTable()">Generate</button><br><br>
    <div id="displayTables"></div>


    <p id="paragraph"></p>
</body>
<script>
    function generateTable() {

        let inp1 = Number(document.getElementById("input1").value);
        let inp2 = Number(document.getElementById("input2").value);
        if (input1.value < input2.value) {
            displayTables.innerHTML = ''
            for (let index = inp1; index <= inp2; index++) {
                const div = document.createElement('div')
                console.log(div);
                
                for (let i = 1; i < 13; i++) {
                    div.innerHTML += `${index} x ${i} = ${index * i}<br>`
                }
                displayTables.appendChild(div)
            }
        }
        else{
            alert('error')
        }
    }


    






</script>

</html>
