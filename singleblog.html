<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>single blog post</h1>
    <div id="display"></div>
  </body>

  <script type="module">
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
    // TODO: Add SDKs for Firebase products that you want to use
    // https://firebase.google.com/docs/web/setup#available-libraries

    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCX3-FfylRgnomQ3UQ7p9Y7M5HJjkIMPaU",
      authDomain: "mediablog-65589.firebaseapp.com",
      projectId: "mediablog-65589",
      storageBucket: "mediablog-65589.firebasestorage.app",
      messagingSenderId: "100464917746",
      appId: "1:100464917746:web:76b3128200227d845be46b",
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore();

    const urlParams = new URLSearchParams(window.location.search.substring(1));

    const blogId = urlParams.get("id");
    let docRef;

    if (!blogId) {
      alert("no id found");
    } else {
      docRef = doc(db, "mediablog", blogId);
      console.log(docRef);
    }

    async function getSingleBlog() {
      try {
        const docSnapShot = await getDoc(docRef);

        console.log(docSnapShot);

        if (docSnapShot.exists()) {
          const data = docSnapShot.data();
          console.log(data);

          const blog = { id: docSnapShot.id, ...data };
          console.log(blog);

          displaySingleBlog(blog);
        }
      } catch (error) {
        console.log(error);
      }
    }

    function displaySingleBlog(params) {
      console.log(params);
      
      let display = document.getElementById("display");

      display.innerHTML += `
       <div style="border:2px solid black; width:500px;margin-bottom:20px;">
                
                <h1>
                    ${params.title}
                </h1>
                 <img src="${params.image}" alt="" style="width:300px;">
                <p>${params.content}</p>
                <p>${params.author}</p>
              
            </div>

    `;
    }
    getSingleBlog();
  </script>
</html>
